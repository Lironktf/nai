version: '3.9'

# No local Postgres — the database is hosted on Supabase.
# This compose file runs server + web client + meet side panel app.
# For local Supabase (optional), run: supabase start

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MEET_URL=http://localhost:5174
    volumes:
      - ./server/src:/app/src   # hot-reload in dev
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - server
    restart: unless-stopped

  meet:
    build:
      context: ./meet
      dockerfile: Dockerfile
    ports:
      - '5174:5174'
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_MEET_FALLBACK_PREFIX=NAI
    depends_on:
      - server
    restart: unless-stopped
